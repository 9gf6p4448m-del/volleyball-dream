<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1c2230" />
    <link rel="icon" type="image/png" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <title>排球夢 — Phase 1 單場對戰</title>
    <style>
      * {
        margin: 0; padding: 0; box-sizing: border-box;
        /* 遊戲頁全域禁文字選取/長按選單（iOS 長按=蓄力操作，不能跳出拷貝翻譯） */
        -webkit-user-select: none; user-select: none;
        -webkit-touch-callout: none;
      }
      html, body { height: 100%; overflow: hidden; background: #1c2230; touch-action: none; }
      #app canvas { display: block; touch-action: none; }
      #hud {
        position: fixed;
        top: env(safe-area-inset-top, 0);
        left: env(safe-area-inset-left, 0);
        padding: 10px 14px;
        color: #eef2fa;
        font-family: ui-monospace, Consolas, monospace;
        background: rgba(12, 16, 26, 0.55);
        border-bottom-right-radius: 10px;
        pointer-events: none;
        user-select: none;
        z-index: 10;
      }
      #hud .fps { font-size: 34px; font-weight: 700; line-height: 1.1; }
      #hud .fps span { font-size: 14px; font-weight: 400; opacity: 0.7; }
      #hud .stats { font-size: 12px; line-height: 1.5; white-space: pre-line; opacity: 0.9; }
      #hud .settings { font-size: 11px; margin-top: 4px; opacity: 0.6; }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #eef2fa;
        font-family: system-ui, sans-serif;
        font-size: 18px;
        background: #1c2230;
        z-index: 20;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-Cwwr5ZlA.js"></script>
  <link rel="manifest" href="./manifest.webmanifest"></head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <div id="loading">排球夢 — 載入模型中…</div>
  </body>
</html>
